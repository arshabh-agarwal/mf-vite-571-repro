<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>MF Vite #571</title>
    </head>
    <body>
        <h1>module-federation/vite #571</h1>
        <pre id="log"></pre>

        <script>
            function log(msg) {
                document.getElementById("log").textContent += msg + "\n";
                console.log(msg);
            }
        </script>

        <!--Inline classical script-->
        <script>
            log("1. classic script A");
        </script>

        <!--Inline classical script-->
        <script>
            log("2. classic script B");
        </script>

        <!--Inline module script-->
        <script type="module">
            log("3. module script A");
        </script>

        <!--Inline module script-->
        <script type="module">
            log("4. module script B");
        </script>

        <!--External module script-->
        <script type="module" src="/src/main.js"></script>

        <!--External module script-->
        <script type="module" src="/src/main2.js"></script>

        <script>
            window.addEventListener("load", () => log("7. load event"));
        </script>
    </body>
</html>
